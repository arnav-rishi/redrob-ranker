name: keep-alive

# Keeps the free-tier host (Render/HF/Railway) awake so judges never hit a
# cold start. Set repo secret APP_URL to the deployed URL. GitHub cron can lag,
# so an UptimeRobot 5-min HTTP monitor is a more reliable primary; this is a backup.
on:
  schedule:
    - cron: "*/10 * * * *"    # every 10 minutes
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/results")
          echo "HTTP $STATUS"

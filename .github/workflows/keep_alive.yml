name: keep-alive

on:
  schedule:
    - cron: "0 */6 * * *"   # ping every 6 hours
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STREAMLIT_URL }}")
          echo "HTTP $STATUS"

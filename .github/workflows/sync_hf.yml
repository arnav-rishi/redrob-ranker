name: sync-to-hf-spaces

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@github"
          git config user.name "GitHub Actions"
          git remote add hf https://arnav-rishi:${HF_TOKEN}@huggingface.co/spaces/arnav-rishi/redrob-ranker
          git push hf HEAD:main --force

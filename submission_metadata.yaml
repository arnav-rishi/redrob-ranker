  platform: "Local Windows machine"
  cpu_cores: 10                                 # physical cores (16 logical)
  ram_gb: 16.8
  python_version: "3.11.0"
  os: "Windows 11 (build 10.0.26200)"
  uses_gpu_for_inference: false
  has_network_during_ranking: false

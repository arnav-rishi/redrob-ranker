# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude Code throughout development for architecture planning and
  implementation. Every design decision -- scoring weights, gate thresholds,
  the skill ontology, the honeypot/integrity thresholds -- was driven by the
  team reviewing real data audits (EDA on the full 100K pool) at each step
  and explicitly approving the approach before implementation proceeded.
  No candidate data was sent to any external/hosted service; all development
  happened against the local dataset with no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic, rule-based ranker -- no LLM calls, embeddings, or GPU at
  ranking time. A two-stage funnel (cheap vectorized pre-score over all 100K
  candidates, shortlisting ~2,000 for a full scorer) keeps runtime well under
  the 5-minute budget. The full scorer combines six additive components
  (skill-trust against a curated skill ontology, career trajectory, years of
  experience, TF-IDF lexical similarity to a hand-authored JD reference,
  location, education) with three multiplicative gates: a role-fit gate
  (exact + substring title matching) that defeats keyword-stuffing regardless
  of skill density, an integrity gate that zeroes out honeypot/impossible
  profiles (YoE-vs-company-age mismatches, zero-duration "expert" claims), and
  an availability multiplier built from behavioral signals (recruiter
  response rate, recent activity, notice period). Every threshold was
  calibrated against the real distribution of the full candidate pool rather
  than guessed -- e.g. the integrity gate's recalibration raised honeypot
  detection from 0 to 69 caught on the full pool. Reasoning strings are
  generated from the same computed feature values used for scoring, so every
  claim is fact-grounded and traceable.

